name: Crumb

# The Xcode project is generated from this file with XcodeGen so the repo stays
# diff-friendly. Run `xcodegen generate` after changing sources or this manifest.

options:
  bundleIdPrefix: com.crumbllc
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "27.0"
    macOS: "27.0"
    visionOS: "27.0"
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"
    SWIFT_EMIT_LOC_STRINGS: "YES"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"

packages:
  CrumbKit:
    path: CrumbKit
  CrumbArt:
    path: CrumbArt

targets:
  Crumb:
    type: application
    supportedDestinations: [iOS, macOS, visionOS]
    sources:
      - path: Crumb
    dependencies:
      - package: CrumbKit
      - package: CrumbArt
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.crumbllc.Crumb
        PRODUCT_NAME: Crumb
        GENERATE_INFOPLIST_FILE: "YES"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        SUPPORTS_MACCATALYST: "NO"
        # SwiftUI App lifecycle: generate the scene manifest + a simple launch screen
        # (required by the iOS SDK) without a storyboard.
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: Crumb
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.shopping"

  CrumbTests:
    type: bundle.unit-test
    supportedDestinations: [iOS, macOS, visionOS]
    sources:
      - path: CrumbTests
    dependencies:
      - target: Crumb
      - package: CrumbKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.crumbllc.CrumbTests
        GENERATE_INFOPLIST_FILE: "YES"
        # The host-app bundle layout differs by platform (macOS nests the binary in
        # Contents/MacOS); set TEST_HOST / BUNDLE_LOADER per SDK so tests host correctly.
        "TEST_HOST[sdk=macosx*]": "$(BUILT_PRODUCTS_DIR)/Crumb.app/Contents/MacOS/Crumb"
        "BUNDLE_LOADER[sdk=macosx*]": "$(BUILT_PRODUCTS_DIR)/Crumb.app/Contents/MacOS/Crumb"
        "TEST_HOST[sdk=iphonesimulator*]": "$(BUILT_PRODUCTS_DIR)/Crumb.app/Crumb"
        "BUNDLE_LOADER[sdk=iphonesimulator*]": "$(BUILT_PRODUCTS_DIR)/Crumb.app/Crumb"
        "TEST_HOST[sdk=iphoneos*]": "$(BUILT_PRODUCTS_DIR)/Crumb.app/Crumb"
        "BUNDLE_LOADER[sdk=iphoneos*]": "$(BUILT_PRODUCTS_DIR)/Crumb.app/Crumb"
        "TEST_HOST[sdk=xrsimulator*]": "$(BUILT_PRODUCTS_DIR)/Crumb.app/Crumb"
        "BUNDLE_LOADER[sdk=xrsimulator*]": "$(BUILT_PRODUCTS_DIR)/Crumb.app/Crumb"
        "TEST_HOST[sdk=xros*]": "$(BUILT_PRODUCTS_DIR)/Crumb.app/Crumb"
        "BUNDLE_LOADER[sdk=xros*]": "$(BUILT_PRODUCTS_DIR)/Crumb.app/Crumb"

  CrumbUITests:
    type: bundle.ui-testing
    supportedDestinations: [iOS, macOS, visionOS]
    sources:
      - path: CrumbUITests
    dependencies:
      - target: Crumb
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.crumbllc.CrumbUITests
        GENERATE_INFOPLIST_FILE: "YES"

  # Runs the CrumbKit package's own unit tests (its 8 @testable suites) on a real
  # destination. `swift test` runs on the macOS host, whose FoundationModels runtime
  # does NOT yet ship the dynamic-session API — so once CrumbKit links that API the host
  # test bundle fails to dlopen. The iOS 27 simulator runtime DOES ship it, so we re-host
  # the same package test sources in this logic-test bundle and run them on the sim. No
  # duplication: it points at the existing CrumbKit/Tests/CrumbKitTests files.
  CrumbKitSimTests:
    type: bundle.unit-test
    supportedDestinations: [iOS, visionOS]
    sources:
      - path: CrumbKit/Tests/CrumbKitTests
    dependencies:
      - package: CrumbKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.crumbllc.CrumbKitSimTests
        GENERATE_INFOPLIST_FILE: "YES"
        ENABLE_TESTABILITY: "YES"

schemes:
  Crumb:
    build:
      targets:
        Crumb: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CrumbTests
        - CrumbKitSimTests
        - CrumbUITests
